[platformio]
# Cambiamos el entorno por defecto a la S3
default_envs = esp32-s3-devkitc-1
data_dir = data

[common]
version = -D BUILD_TAG="V1.0.a0-Build-20260311"
lib_deps = 
    bblanchon/ArduinoJson @ ^6.18.5
    knolleary/PubSubClient @ ^2.8
    paulstoffregen/Time @ ^1.6.1
    ottowinter/ESPAsyncWebServer-esphome@^2.1.0

# --- CONFIGURACIÓN PARA ESP32-S3 ---
[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

# Definiciones específicas de la S3
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

# IMPORTANTE: La S3 suele usar particiones grandes, usamos la que ya tenías
board_build.partitions = huge_app.csv

# Si tu S3 tiene problemas al subir, estos flags habilitan el USB CDC (Serial por USB nativo)
build_flags = 
    ${common.version}
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    ${common.lib_deps}

# Protocolo y velocidad de subida
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200

# Descomenta y ajusta si Linux no detecta el puerto automáticamente
# upload_port = /dev/ttyACM0
# monitor_port = /dev/ttyACM0